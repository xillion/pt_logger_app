# =============================================================
# PT_LOGGER_L433_V1  —  prj.conf
# =============================================================
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_FPU=y
CONFIG_CORTEX_M_SYSTICK=y
CONFIG_CORTEX_M_DWT=y
CONFIG_PINCTRL=y
# -------------------------------------------------------------
# Console  (USART1 — debug, remove later)
# -------------------------------------------------------------
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_USE_RUNTIME_CONFIGURE=y
# -------------------------------------------------------------
# Shell
# -------------------------------------------------------------
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="pt_logger:~$ "
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_HISTORY_BUFFER=512
CONFIG_SHELL_TAB=y
CONFIG_SHELL_TAB_AUTOCOMPLETION=y

# -------------------------------------------------------------
# Logging
# -------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BUFFER_SIZE=4096

# -------------------------------------------------------------
# USB CDC-ACM  (old stack — Zephyr 4.x)
# -------------------------------------------------------------
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="PT Logger"
# CONFIG_USB_DEVICE_VID=0x2FE3
# CONFIG_USB_DEVICE_PID=0x0001
# -------------------------------------------------------------
# GPIO / Reboot
# -------------------------------------------------------------
CONFIG_GPIO=y
CONFIG_GPIO_SHELL=y
CONFIG_REBOOT=y
CONFIG_CRC=y

#
# 1-Wire support
#
CONFIG_W1=y
CONFIG_W1_SHELL=y
CONFIG_W1_ZEPHYR_GPIO_TIME_CRITICAL=y
#
# I2C support
#
CONFIG_I2C=y
CONFIG_I2C_SHELL=y
CONFIG_I2C_LOG_LEVEL_INF=y
CONFIG_I2C_STM32_V2_TIMING=y
CONFIG_I2C_STM32=y